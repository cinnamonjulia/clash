<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash — BBYO School Dates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a03b5; --card:#ffffff; --ink:#161046; --ink-soft:#6e6a93; --line:#ececf6;
    --brand:#f8f90a; --brand-soft:#fff7c2;
    --nc:#1a03b5; --off:#128a4e; --off-bg:#e3f7ea; --in:#d8390a; --in-bg:#fde7de;
    --wknd:#0c8e92; --wknd-bg:#ddf5f3; --warn:#8a6b00; --warn-bg:#fdf6c9; --pend:#1a03b5; --pend-bg:#dbe8ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1a03b5; --card:#ffffff; --ink:#161046; --ink-soft:#6e6a93; --line:#ececf6;
      --brand:#f8f90a; --brand-soft:#fff7c2; --nc:#1a03b5;
      --off:#128a4e; --off-bg:#e3f7ea; --in:#d8390a; --in-bg:#fde7de;
      --wknd:#0c8e92; --wknd-bg:#ddf5f3; --warn:#8a6b00; --warn-bg:#fdf6c9;
      --pend:#1a03b5; --pend-bg:#dbe8ff;
    }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",Roboto,sans-serif; line-height:1.45; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1000px; margin:0 auto; padding:26px 20px 80px; }
  header h1 { font-size:30px; margin:0 0 4px; letter-spacing:-0.02em; }
  header .sub { color:var(--ink-soft); font-size:15px; margin:0; }
  /* region picker */
  .picker { margin:20px 0 4px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .picker label { font-size:13px; font-weight:600; color:var(--ink-soft); }
  select#region { font:inherit; font-size:16px; font-weight:600; padding:11px 14px; border-radius:12px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); min-width:280px; cursor:pointer; }
  .card { background:var(--card); border-radius:16px; border:1px solid var(--line);
    box-shadow:0 2px 14px rgba(40,42,90,0.05); padding:20px; margin-top:18px; }
  h2 { font-size:19px; margin:0 0 4px; letter-spacing:-0.01em; }
  .h2sub { color:var(--ink-soft); font-size:13px; margin:0 0 14px; }
  input[type=date] { font:inherit; font-size:16px; padding:10px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--bg); color:var(--ink); }
  .summary { margin-top:16px; font-size:15px; color:var(--ink-soft); } .summary b { color:var(--ink); }
  .result-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:8px; margin-top:14px; }
  .result { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:9px 12px;
    border-radius:10px; font-size:13.5px; background:var(--bg); }
  .result .nm { font-weight:600; } .result .rg { font-size:11px; color:var(--ink-soft); }
  .st { font-size:12px; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  .st.great{color:var(--off);background:var(--off-bg);} .st.school{color:var(--warn);background:var(--warn-bg);}
  .st.risky{color:var(--in);background:var(--in-bg);} .st.flex{color:var(--wknd);background:var(--wknd-bg);}
  .st.unknown{color:var(--ink-soft);background:var(--line);}
  /* best weekends strip */
  .bw-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:10px; margin-top:14px; }
  .bw { font:inherit; text-align:left; cursor:pointer; border:1px solid var(--line); background:#f2f2fb;
    border-radius:14px; padding:11px 13px; display:flex; flex-direction:column; gap:4px; color:var(--ink); }
  .bw:hover { border-color:var(--brand); box-shadow:0 4px 14px rgba(248,249,10,.25); }
  .bw .bw-date { font-weight:700; font-size:15px; }
  .bw .bw-rank { color:var(--ink-soft); font-weight:600; font-size:11px; letter-spacing:.06em; text-transform:uppercase; }
  .bw .bw-meta { font-size:12px; color:var(--ink-soft); }
  .bw .bw-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .bw.perfect { border-color:var(--off); }
  .bwtoggle { font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; margin-top:12px; padding:7px 14px;
    border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); }
  .bwtoggle:hover { border-color:var(--brand); }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--ink-soft); margin-top:12px; }
  .legend span { display:inline-flex; align-items:center; gap:5px; } .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  /* region overview grid */
  .rgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:12px; margin-top:16px; }
  .rcard { text-align:left; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:14px; cursor:pointer; font:inherit; color:var(--ink); }
  .rcard:hover { border-color:var(--brand); }
  .rcard .rn { font-weight:700; font-size:14px; } .rcard .rs { color:var(--ink-soft); font-size:12px; margin-top:2px; }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; margin-top:9px; }
  .badge.ok { color:var(--off); background:var(--off-bg); } .badge.pend { color:var(--pend); background:var(--pend-bg); }
  /* district cards */
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin:18px 0 0; }
  .filters button { font:inherit; font-size:13.5px; font-weight:600; cursor:pointer; padding:7px 14px;
    border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); }
  .filters button.active { background:var(--brand); color:#fff; border-color:var(--brand); }
  .state-group { margin-top:22px; } .state-group h3 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin:0 0 10px; }
  .dgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
  .district { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .district .top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .district .name { font-weight:700; font-size:15.5px; } .district .city { color:var(--ink-soft); font-size:12.5px; margin-top:1px; }
  .chip { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; color:#fff; background:var(--nc); white-space:nowrap; }
  .dates { margin-top:12px; display:grid; grid-template-columns:auto 1fr; gap:5px 12px; font-size:13px; }
  .dates dt { color:var(--ink-soft); } .dates dd { margin:0; text-align:right; font-variant-numeric:tabular-nums; }
  .tbd { color:var(--ink-soft); font-style:italic; }
  .warnflag { margin-top:12px; font-size:12px; color:var(--warn); background:var(--warn-bg); padding:8px 10px; border-radius:9px; }
  .pendbox { text-align:center; padding:30px 20px; color:var(--ink-soft); }
  .pendbox .big { font-size:38px; } .pendbox h3 { color:var(--ink); margin:10px 0 6px; }
  .hublist { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:14px; }
  .hub { font-size:12.5px; padding:5px 11px; border-radius:999px; background:var(--brand-soft); color:var(--brand); font-weight:600; }
  footer { margin-top:34px; color:var(--ink-soft); font-size:12.5px; text-align:center; }
  /* --- BBYO brand: condensed display type + rounded shapes --- */
  h1, h2, .state-group h3, .rcard .rn, .district .name, .filters button,
  select#region, .badge, .chip, .st, .pendbox h3, .picker label {
    font-family:"Oswald","Arial Narrow",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  header h1 { text-transform:uppercase; font-weight:700; letter-spacing:.5px; font-size:42px;
    color:#f8f90a; -webkit-text-fill-color:#f8f90a; }
  header .sub { font-size:15.5px; }
  h2 { text-transform:uppercase; font-weight:700; letter-spacing:.4px; font-size:20px; }
  .state-group h3 { font-weight:600; font-size:14px; }
  .filters button, .badge, .chip, .st { text-transform:uppercase; letter-spacing:.4px; font-weight:600; }
  .picker label { text-transform:uppercase; letter-spacing:.5px; }
  .card { border-radius:22px; box-shadow:0 6px 22px rgba(251,36,97,.07); }
  .district, .rcard, .result { border-radius:16px; }
  select#region { border-radius:14px; font-weight:600; font-size:17px; }
  .filters button.active { box-shadow:0 5px 16px rgba(251,36,97,.32); }
  .rcard:hover { border-color:var(--brand); box-shadow:0 5px 16px rgba(251,36,97,.14); }
  .hub { background:var(--brand-soft); color:var(--brand); }
  body { background:
     radial-gradient(1100px 520px at 50% -12%, rgba(255,255,255,.12), transparent 60%),
     var(--bg); background-attachment:fixed; }
  /* text that sits directly on the blue backdrop */
  header .sub, header .credit, .picker label, footer { color:#cfd2ff; }
  header .credit { font-size:12.5px; margin:6px 0 0; opacity:.85; }
  footer .warn, footer { opacity:.95; }
  .card { box-shadow:0 12px 34px rgba(5,2,45,.32); }
  input[type=date], .result { background:#f2f2fb; }
  /* yellow accent needs dark text for contrast */
  .filters button.active { color:#161046; box-shadow:0 5px 16px rgba(248,249,10,.30); }
  .hub { color:#6b5b00; }
  .rcard:hover { border-color:var(--brand); box-shadow:0 6px 16px rgba(248,249,10,.22); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Clash</h1>
    <p class="sub">Spot the clash before you book it — BBYO school dates across the Order.</p>
    <p class="credit">This tool was built by the 2026 ILTC Team based on a suggestion from Zachary Tabachnikoff.</p>
  </header>

  <div class="picker">
    <label for="region">View:</label>
    <select id="region"></select>
  </div>

  <div id="view"></div>

  <footer id="foot"></footer>
</div>

<script src="data.js"></script>
<script>
  const DATA = window.CALENDER_DATA;
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const STATE_NAMES = {AL:"Alabama",AZ:"Arizona",CA:"California",CO:"Colorado",CT:"Connecticut",DC:"Washington DC",DE:"Delaware",FL:"Florida",GA:"Georgia",HI:"Hawaii",IA:"Iowa",IL:"Illinois",IN:"Indiana",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",MA:"Massachusetts",MD:"Maryland",ME:"Maine",MI:"Michigan",MN:"Minnesota",MO:"Missouri",MS:"Mississippi",NC:"North Carolina",NE:"Nebraska",NH:"New Hampshire",NJ:"New Jersey",NY:"New York",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",TN:"Tennessee",TX:"Texas",VA:"Virginia",WA:"Washington",WI:"Wisconsin",WV:"West Virginia",BC:"British Columbia",AB:"Alberta",MB:"Manitoba"};
  const CA_PROVINCES = {BC:1,AB:1,MB:1,ON:1,QC:1};
  const DEFAULT_DATE = "2026-12-25";

  // ---- date helpers ----
  const toDate = s => { if(!s) return null; const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
  const isoOf = dt => dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
  const fmt = s => { const dt=toDate(s); return dt? MONTHS[dt.getMonth()]+" "+dt.getDate() : null; };
  function fmtRange(r){ if(!r) return null; const [a,b]=r.split(" to "); const da=toDate(a),db=toDate(b);
    return da.getMonth()===db.getMonth() ? MONTHS[da.getMonth()]+" "+da.getDate()+"–"+db.getDate()
      : MONTHS[da.getMonth()]+" "+da.getDate()+" – "+MONTHS[db.getMonth()]+" "+db.getDate(); }
  function inRange(dt,r){ if(!r) return false; const [a,b]=r.split(" to "); return dt>=toDate(a)&&dt<=toDate(b); }
  // US national holidays every district takes off (rarely in the data since schools are
  // closed anyway) — treated like MLK: the adjacent weekend is a family-travel risk.
  // Canadian districts carry their own stat holidays (Labour/Family/Victoria Day) in otherBreaks.
  const NATIONAL_HOLIDAYS = {"2026-09-07":"Labor Day (may travel)","2027-05-31":"Memorial Day (may travel)"};
  // Is this date a multi-day break / holiday closure (not a weekend)? Returns a label or null.
  function breakLabel(d,dt){
    if(!CA_PROVINCES[d.state] && NATIONAL_HOLIDAYS[isoOf(dt)]) return NATIONAL_HOLIDAYS[isoOf(dt)];
    if(d.firstDay&&d.lastDay&&(dt<toDate(d.firstDay)||dt>toDate(d.lastDay))) return "Summer break";
    if(inRange(dt,d.fallBreak)) return "Fall break";
    if(inRange(dt,d.midwinterBreak)) return "Mid-winter break";
    if(inRange(dt,d.thanksgivingBreak)) return "Thanksgiving break";
    if(inRange(dt,d.winterBreak)) return "Winter break";
    if(inRange(dt,d.springBreak)) return "Spring break";
    if(d.mlkDay && dt.getTime()===toDate(d.mlkDay).getTime()) return "Holiday (may travel)";
    if(d.otherBreaks){ for(const b of d.otherBreaks){ if(inRange(dt,b.range)) return b.label; } }
    return null;
  }
  // Programming-quality of a date: great = teens home & free (weekend),
  // school = weekday in class (evenings ok), risky = break/holiday or a break-adjacent weekend (may travel).
  function statusOn(d,dt){
    const bl=breakLabel(d,dt);
    if(bl) return {kind:"risky",label:bl};
    if(!d.firstDay||!d.lastDay) return {kind:"unknown",label:"Dates pending"};
    const iso=isoOf(dt);
    if(d.bigEvents){ const e=d.bigEvents.find(e=>e.date===iso); if(e) return {kind:"risky",label:e.label+" — teens busy"}; }
    if(d.teacherWorkdays && d.teacherWorkdays.indexOf(iso)>=0) return {kind:"flex",label:"Teacher workday — teens off"};
    if(d.halfDays && d.halfDays.indexOf(iso)>=0) return {kind:"flex",label:"Half day — out early"};
    const dow=dt.getDay();
    if(dow===0||dow===6){
      // A weekend that bookends a break (break sits on the Friday before or Monday after) = travel weekend.
      const fri=new Date(dt); fri.setDate(dt.getDate()-(dow===0?2:1));
      const mon=new Date(dt); mon.setDate(dt.getDate()+(dow===0?1:2));
      if(breakLabel(d,fri)||breakLabel(d,mon)) return {kind:"risky",label:"Break-adjacent weekend — may travel"};
      return {kind:"great",label:"Weekend — free"};
    }
    return {kind:"school",label:"School day"};
  }

  // ---- best weekends (Sep–May) ----
  // Jewish holidays 2026-27 that land on (or bleed into) weekends. Schools don't flag
  // these when they fall on a Sat/Sun, but no BBYO region can program them.
  const CHAGIM = {
    "2026-09-12":"Rosh Hashanah","2026-09-13":"Rosh Hashanah",
    "2026-09-20":"Erev Yom Kippur","2026-09-21":"Yom Kippur",
    "2026-09-26":"Sukkot","2026-09-27":"Sukkot",
    "2026-10-03":"Shemini Atzeret","2026-10-04":"Simchat Torah",
    "2027-04-22":"Passover","2027-04-23":"Passover",
    "2027-04-24":"Passover (chol hamoed)","2027-04-25":"Passover (chol hamoed)",
    "2027-04-28":"Passover","2027-04-29":"Passover"
  };
  // Every Saturday from Sep 2026 through May 2027.
  function sepMaySaturdays(){
    const out=[], end=new Date(2027,4,31), d=new Date(2026,8,1);
    while(d.getDay()!==6) d.setDate(d.getDate()+1);
    for(; d<=end; d.setDate(d.getDate()+7)) out.push(new Date(d));
    return out;
  }
  // Only rank districts whose break data is actually loaded — a scaffold with just a
  // first day would otherwise look free every weekend of the year.
  const hasCoreDates = d => !!(d.firstDay&&d.lastDay&&d.winterBreak&&d.springBreak);
  // Score one weekend across districts: free = Sat+Sun both "great" (home, no travel risk),
  // long3 = free AND Fri or Mon is a teacher workday (3-day weekend — overnight gold).
  function scoreWeekend(districts, sat){
    const sun=new Date(sat); sun.setDate(sat.getDate()+1);
    const fri=new Date(sat); fri.setDate(sat.getDate()-1);
    const mon=new Date(sat); mon.setDate(sat.getDate()+2);
    const fIso=isoOf(fri), mIso=isoOf(mon);
    let free=0,busy=0,unk=0,long3=0;
    districts.forEach(d=>{
      if(!hasCoreDates(d)){ unk++; return; }
      const a=statusOn(d,sat).kind, b=statusOn(d,sun).kind;
      if(a==="unknown"||b==="unknown"){ unk++; return; }
      if(a==="great"&&b==="great"){
        free++;
        const tw=d.teacherWorkdays||[];
        if(tw.indexOf(fIso)>=0||tw.indexOf(mIso)>=0) long3++;
      } else busy++;
    });
    const chag = CHAGIM[isoOf(sat)] || CHAGIM[isoOf(sun)] || null;
    return {sat,free,busy,unk,long3,chag,total:free+busy};
  }
  function fmtWknd(sat){
    const sun=new Date(sat); sun.setDate(sat.getDate()+1);
    return sat.getMonth()===sun.getMonth()
      ? MONTHS[sat.getMonth()]+" "+sat.getDate()+"–"+sun.getDate()
      : MONTHS[sat.getMonth()]+" "+sat.getDate()+" – "+MONTHS[sun.getMonth()]+" "+sun.getDate();
  }
  // ---- summer synergy (Jun–Aug) ----
  // Shavuot 2027 lands Fri-Sat June 11-12 — tag summer weeks that overlap it.
  const SUMMER_CHAGIM = {"2027-06-11":"Shavuot","2027-06-12":"Shavuot"};
  // Mondays covering both summers in the dataset: Jul-Aug 2026 and Jun-Aug 2027.
  function summerMondays(){
    const out=[];
    const push=(from,to)=>{ const d=new Date(from); while(d.getDay()!==1) d.setDate(d.getDate()+1);
      for(; d<=to; d.setDate(d.getDate()+7)) out.push(new Date(d)); };
    push(new Date(2026,6,1), new Date(2026,7,31));
    push(new Date(2027,5,1), new Date(2027,7,24));
    return out;
  }
  // Score a Mon-Sun week: fullOut = district on summer break all 7 days.
  function scoreSummerWeek(districts, mon){
    const days=[...Array(7)].map((_,i)=>{ const t=new Date(mon); t.setDate(mon.getDate()+i); return t; });
    let fullOut=0,partial=0,inSess=0,chag=null;
    days.forEach(t=>{ if(SUMMER_CHAGIM[isoOf(t)]) chag=SUMMER_CHAGIM[isoOf(t)]; });
    districts.forEach(d=>{
      if(!(d.firstDay&&d.lastDay)) return;
      const fd=toDate(d.firstDay), ld=toDate(d.lastDay);
      const outDays=days.filter(t=>t<fd||t>ld).length;
      if(outDays===7) fullOut++; else if(outDays>0) partial++; else inSess++;
    });
    return {mon,fullOut,partial,inSess,chag,total:fullOut+partial+inSess};
  }
  function fmtWeek(mon){
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    return (mon.getMonth()===sun.getMonth()
      ? MONTHS[mon.getMonth()]+" "+mon.getDate()+"–"+sun.getDate()
      : MONTHS[mon.getMonth()]+" "+mon.getDate()+" – "+MONTHS[sun.getMonth()]+" "+sun.getDate())+
      ", "+mon.getFullYear();
  }

  function bestWeekendsCard(){
    return '<section class="card" id="bestwknd"><h2 id="bwtitle">Best dates — planner</h2>'+
      '<select id="bwmode" style="font:inherit;font-weight:600;font-size:14px;padding:8px 12px;border-radius:12px;border:1px solid var(--line);background:#f2f2fb;color:var(--ink);margin:2px 0 4px;cursor:pointer;">'+
      '<option value="year">🎒 School year — best weekends (Sep–May)</option>'+
      '<option value="summer">☀️ Summer synergy — school\'s out (Jun–Aug)</option></select>'+
      '<p class="h2sub" id="bwsub"></p><div class="bw-grid" id="bwgrid"></div>'+
      '<button class="bwtoggle" id="bwtoggle"></button></section>';
  }
  function renderBestWeekends(districts){
    const grid=document.getElementById("bwgrid"), sub=document.getElementById("bwsub"),
      tog=document.getElementById("bwtoggle"), modeSel=document.getElementById("bwmode"),
      title=document.getElementById("bwtitle");
    let mode="year", showAll=false;

    function jump(dt){
      const target=document.querySelector("#view input[type=date]");
      if(target){ target.value=isoOf(dt); target.dispatchEvent(new Event("input")); target.scrollIntoView({behavior:"smooth",block:"center"}); }
    }
    function chip(cls, rank, dateLabel, tags, meta, jumpTo){
      const el=document.createElement("button"); el.className="bw"+cls;
      el.innerHTML=(rank?'<span class="bw-rank">'+rank+'</span>':"")+
        '<span class="bw-date">'+dateLabel+'</span><span class="bw-tags">'+tags+'</span>'+
        '<span class="bw-meta">'+meta+'</span>';
      el.addEventListener("click",()=>jump(jumpTo));
      grid.appendChild(el);
    }

    function paintYear(){
      title.textContent="Best weekends — Sep to May";
      const withData=districts.filter(hasCoreDates).length;
      if(!withData){
        sub.textContent="No districts in this view have full break dates loaded yet — rankings will appear once they're gathered.";
        grid.innerHTML=""; tog.style.display="none"; return;
      }
      tog.style.display="";
      const scored=sepMaySaturdays().map(s=>scoreWeekend(districts,s)).filter(w=>w.total>0);
      sub.textContent="Weekends where teens are home, in school Fri & Mon (no break travel), ranked. "+
        "✦ = 3-day weekend (teacher workday) — prime for overnights · ✡ = Jewish holiday, no programming. "+
        "Based on "+withData+" of "+districts.length+" districts with full dates. Tap a weekend to load it in the checker.";
      const pctOf = w => w.chag ? -1 : w.free/w.total; // chag weekends sink to the bottom
      const ranked=scored.slice().sort((a,b)=> pctOf(b)-pctOf(a) || b.long3-a.long3 || a.sat-b.sat);
      grid.innerHTML="";
      (showAll?scored:ranked.slice(0,10)).forEach((w,i)=>{
        const pct=w.free/w.total;
        let tags, meta;
        if(w.chag){ tags='<span class="st risky">✡ '+w.chag+'</span>'; meta="Jewish holiday — no programming"; }
        else {
          tags='<span class="st '+(pct===1?"great":pct>=0.8?"flex":pct>=0.5?"school":"risky")+'">'+w.free+"/"+w.total+" free</span>";
          if(w.long3>0) tags+='<span class="st flex">✦ 3-day for '+w.long3+'</span>';
          meta = w.busy>0 ? w.busy+" on break / traveling" : "All clear";
        }
        chip(pct===1&&!w.chag?" perfect":"", showAll?"":"#"+(i+1), fmtWknd(w.sat), tags, meta, w.sat);
      });
      tog.textContent = showAll ? "Show top 10 only" : "Show all "+scored.length+" weekends (Sep–May)";
    }

    function paintSummer(){
      title.textContent="Summer synergy — school's out";
      const withData=districts.filter(d=>d.firstDay&&d.lastDay).length;
      if(!withData){
        sub.textContent="No districts in this view have first/last days loaded yet — the summer window will appear once they're gathered.";
        grid.innerHTML=""; tog.style.display="none"; return;
      }
      tog.style.display="";
      const scored=summerMondays().map(m=>scoreSummerWeek(districts,m)).filter(w=>w.total>0);
      sub.textContent="Full weeks (Mon–Sun) ranked by how many districts are completely out of session — the shared "+
        "window for summer programs, trips & internships. ✡ = Shavuot week. Based on "+withData+" of "+
        districts.length+" districts with first/last days. Tap a week to load its Monday in the checker.";
      const ranked=scored.slice().sort((a,b)=>
        (b.fullOut/b.total)-(a.fullOut/a.total) || (a.chag?1:0)-(b.chag?1:0) || a.mon-b.mon);
      grid.innerHTML="";
      (showAll?scored:ranked.slice(0,10)).forEach((w,i)=>{
        const pct=w.fullOut/w.total;
        let tags='<span class="st '+(pct===1?"great":pct>=0.8?"flex":pct>=0.5?"school":"risky")+'">'+
          w.fullOut+"/"+w.total+" out all week</span>";
        if(w.chag) tags+='<span class="st risky">✡ '+w.chag+'</span>';
        const meta = pct===1 ? "Everyone's out — full synergy"
          : (w.inSess?w.inSess+" still in session":"")+(w.inSess&&w.partial?" · ":"")+(w.partial?w.partial+" partial week":"");
        chip(pct===1&&!w.chag?" perfect":"", showAll?"":"#"+(i+1), fmtWeek(w.mon), tags, meta, w.mon);
      });
      tog.textContent = showAll ? "Show top 10 only" : "Show all "+scored.length+" summer weeks";
    }

    function paint(){ mode==="year" ? paintYear() : paintSummer(); }
    modeSel.addEventListener("change",()=>{ mode=modeSel.value; showAll=false; paint(); });
    tog.addEventListener("click",()=>{ showAll=!showAll; paint(); });
    paint();
  }

  // collect all districts from populated regions, tagged with region name
  function allDistricts(){
    const out=[];
    DATA.regions.filter(r=>r.status==="populated").forEach(r=>
      r.districts.forEach(d=> out.push(Object.assign({_region:r.name},d))));
    return out;
  }

  // ---- checker (shared) ----
  function renderChecker(host, districts, showRegion){
    const val = host.querySelector("input[type=date]").value;
    const summary = host.querySelector(".summary");
    const results = host.querySelector(".result-grid");
    results.innerHTML="";
    if(!val){ summary.textContent="Pick a date above."; return; }
    const dt=toDate(val);
    let great=0,school=0,risky=0,flex=0,unk=0;
    districts.forEach(d=>{
      const s=statusOn(d,dt);
      if(s.kind==="great")great++; else if(s.kind==="school")school++; else if(s.kind==="risky")risky++; else if(s.kind==="flex")flex++; else unk++;
      const el=document.createElement("div"); el.className="result";
      el.innerHTML='<span><span class="nm">'+d.chapterCity+'</span>'+
        (showRegion?'<br><span class="rg">'+d._region+'</span>':'')+'</span>'+
        '<span class="st '+s.kind+'">'+s.label+'</span>';
      results.appendChild(el);
    });
    const total=districts.length;
    let verdict = great===total ? "🟢 <b>Great window</b> — it's a weekend; teens are home &amp; free."
      : risky===total ? "🔴 <b>Risky</b> — school break/holiday; teens may be traveling."
      : flex===total ? "🩵 <b>Teacher/half day</b> — teens are off school; nice chance (double-check for long-weekend trips)."
      : risky===0 ? "🟡 <b>School day</b> — good for evenings &amp; weekends, not daytime."
      : "🟠 <b>Mixed</b> — some districts on break (teens may be away).";
    summary.innerHTML = verdict+"<br><b>"+great+"</b> home · <b>"+school+"</b> in school · <b>"+risky+"</b> break/holiday"+(flex?" · <b>"+flex+"</b> teacher/half day":"")+(unk?" · "+unk+" pending":"");
  }
  function checkerCard(title, sub){
    return '<section class="card"><h2>'+title+'</h2><p class="h2sub">'+sub+'</p>'+
      '<input type="date" min="2026-07-01" max="2027-08-31" value="'+DEFAULT_DATE+'">'+
      '<div class="summary"></div><div class="result-grid"></div>'+
      '<div class="legend"><span><span class="dot" style="background:var(--off)"></span> Weekend — teens home</span>'+
      '<span><span class="dot" style="background:var(--warn)"></span> School day (eves)</span>'+
      '<span><span class="dot" style="background:var(--wknd)"></span> Teacher/half day</span>'+
      '<span><span class="dot" style="background:var(--in)"></span> Break/holiday — may travel</span></div></section>';
  }

  // ---- district card ----
  function row(l,v){ return "<dt>"+l+"</dt><dd>"+(v?v:'<span class="tbd">TBD</span>')+"</dd>"; }
  function districtCard(d){
    const el=document.createElement("div"); el.className="district";
    let h='<div class="top"><div><div class="name">'+(d.verify?"⚠️ ":"")+d.name+'</div>'+
      '<div class="city">'+d.chapterCity+'</div></div><span>'+
      (d.type==="dayschool"?'<span class="chip" style="background:var(--brand);color:#161046;margin-right:4px;">✡ Day School</span>':'')+
      '<span class="chip">'+d.state+'</span></span></div>';
    h+='<dl class="dates">'+row("First day",fmt(d.firstDay))+row("Last day",fmt(d.lastDay))+
      (d.fallBreak?row("Fall break",fmtRange(d.fallBreak)):"")+
      row("Thanksgiving",fmtRange(d.thanksgivingBreak))+row("Winter break",fmtRange(d.winterBreak))+
      (d.midwinterBreak?row("Mid-winter break",fmtRange(d.midwinterBreak)):"")+
      row("Spring break",fmtRange(d.springBreak))+row("Graduation",fmt(d.graduation))+'</dl>';
    if(d.bigEvents&&d.bigEvents.length){
      h+='<div class="warnflag" style="color:var(--in);background:var(--in-bg);">🎉 '+
        d.bigEvents.map(e=>e.label+" "+fmt(e.date)).join(" · ")+'</div>';
    }
    if(d.verify&&d.verifyNote) h+='<div class="warnflag">⚠️ '+d.verifyNote+'</div>';
    el.innerHTML=h; return el;
  }

  // ---- views ----
  let stateFilter="ALL";
  function renderOrder(){
    const view=document.getElementById("view");
    const pops=DATA.regions.filter(r=>r.status==="populated");
    view.innerHTML = bestWeekendsCard() +
      '<section class="card"><h2>Is this date clear? — Entire Order</h2>'+
      '<p class="h2sub">Which regions are a good programming window. 🟢 weekend = teens home &amp; free · 🟡 school day = evenings only · 🔴 break/holiday = teens may be traveling. '+pops.length+' of '+DATA.regions.length+' regions loaded so far.</p>'+
      '<input type="date" min="2026-07-01" max="2027-08-31" value="'+DEFAULT_DATE+'">'+
      '<div class="summary" id="ordersum"></div><div class="result-grid" id="orderres"></div>'+
      '<div class="legend"><span><span class="dot" style="background:var(--off)"></span> Weekend — teens home</span>'+
      '<span><span class="dot" style="background:var(--warn)"></span> School day</span>'+
      '<span><span class="dot" style="background:var(--wknd)"></span> Teacher/half day</span>'+
      '<span><span class="dot" style="background:var(--in)"></span> Break/holiday — may travel</span></div></section>'+
      '<section class="card"><h2>Regions</h2><p class="h2sub">Pick a region to see its schools by district. ✓ = dates loaded · ⏳ = being gathered.</p><div class="rgrid" id="rgrid"></div></section>';
    renderBestWeekends(allDistricts());
    const input=view.querySelector("#ordersum").closest("section").querySelector("input[type=date]");
    input.addEventListener("input",()=>renderOrderResults(input.value,pops));
    renderOrderResults(input.value,pops);
    const grid=document.getElementById("rgrid");
    DATA.regions.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(r=>{
      const b=document.createElement("button"); b.className="rcard";
      const ok=r.status==="populated";
      b.innerHTML='<div class="rn">'+r.name+'</div><div class="rs">'+
        (r.states||[]).map(s=>s).join(" · ")+'</div>'+
        '<span class="badge '+(ok?"ok":"pend")+'">'+(ok?"✓ "+r.districts.length+" districts":"⏳ pending")+'</span>';
      b.addEventListener("click",()=>{ document.getElementById("region").value=r.id; go(r.id); });
      grid.appendChild(b);
    });
  }

  function renderOrderResults(val,pops){
    const sum=document.getElementById("ordersum");
    const res=document.getElementById("orderres");
    res.innerHTML="";
    if(!pops.length){ sum.textContent="No regions loaded yet."; return; }
    if(!val){ sum.textContent="Pick a date above."; return; }
    const dt=toDate(val);
    const home=[];
    pops.forEach(r=>{
      let g=0,sc=0,rk=0;
      r.districts.forEach(d=>{ const k=statusOn(d,dt).kind; if(k==="great")g++; else if(k==="risky")rk++; else if(k==="school"||k==="flex")sc++; });
      const total=r.districts.length;
      let cls,label;
      if(g===total){ cls="great"; label="Weekend — teens home"; home.push(r.name); }
      else if(rk===total){ cls="risky"; label="Break/holiday — may travel"; }
      else if(rk===0){ cls="school"; label="School day (eves only)"; }
      else { cls="risky"; label=rk+" on break · "+sc+" in school"; }
      const el=document.createElement("div"); el.className="result";
      el.innerHTML='<span class="nm">'+r.name+'</span><span class="st '+cls+'">'+label+'</span>';
      res.appendChild(el);
    });
    const pending=DATA.regions.length-pops.length;
    const head = home.length ? "🟢 <b>Teens home &amp; free:</b> "+home.join(", ")
                             : "🟡 No region is a weekend/home window today — check each for evenings vs. travel.";
    sum.innerHTML = head + "<br><b>"+home.length+"</b> of "+pops.length+" loaded regions are a teens-home window"+
      (pending?" · "+pending+" more still being gathered":"");
  }

  function renderRegion(r){
    const view=document.getElementById("view");
    const statesLine=(r.states||[]).map(s=>STATE_NAMES[s]||s).join(" · ");
    if(r.status!=="populated"){
      view.innerHTML='<section class="card"><div class="pendbox"><div class="big">⏳</div>'+
        '<h3>'+r.name+'</h3><p>'+(r.coverage||statesLine||"")+'</p>'+
        '<p>School dates for this region are still being gathered.<br>Known chapter areas:</p>'+
        '<div class="hublist">'+(r.hubs||[]).map(h=>'<span class="hub">'+h+'</span>').join("")+'</div></div></section>';
      return;
    }
    stateFilter="ALL";
    view.innerHTML = bestWeekendsCard()
      + checkerCard("Is this date clear? — "+r.name,
      "Checks your date across "+r.name+"'s "+r.districts.length+" districts ("+statesLine+").")
      + '<div class="filters" id="filters"></div><div id="districts"></div>';
    renderBestWeekends(r.districts);
    const host=view.querySelector(".summary").closest("section");
    host.querySelector("input").addEventListener("input",()=>renderChecker(host,r.districts,false));
    renderChecker(host,r.districts,false);
    // filters
    const states=[...new Set(r.districts.map(d=>d.state))];
    const filters=document.getElementById("filters");
    const mk=(st,lbl)=>{ const b=document.createElement("button"); b.textContent=lbl; b.dataset.st=st;
      if(st===stateFilter)b.classList.add("active");
      b.addEventListener("click",()=>{ stateFilter=st; renderCards(r); [...filters.children].forEach(c=>c.classList.toggle("active",c.dataset.st===st)); });
      return b; };
    filters.appendChild(mk("ALL","All"));
    states.forEach(s=>filters.appendChild(mk(s,STATE_NAMES[s]||s)));
    renderCards(r);
  }
  function renderCards(r){
    const host=document.getElementById("districts"); host.innerHTML="";
    const states=[...new Set(r.districts.map(d=>d.state))];
    states.forEach(st=>{
      if(stateFilter!=="ALL"&&stateFilter!==st) return;
      const list=r.districts.filter(d=>d.state===st); if(!list.length)return;
      const g=document.createElement("div"); g.className="state-group";
      g.innerHTML="<h3>"+(STATE_NAMES[st]||st)+"</h3>";
      const grid=document.createElement("div"); grid.className="dgrid";
      list.forEach(d=>grid.appendChild(districtCard(d))); g.appendChild(grid); host.appendChild(g);
    });
  }

  // ---- routing ----
  function go(id){
    if(id==="order") renderOrder();
    else renderRegion(DATA.regions.find(r=>r.id===id));
    window.scrollTo(0,0);
  }
  // build dropdown
  const sel=document.getElementById("region");
  const AZ=DATA.regions.slice().sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML='<option value="order">🇺🇸 Entire Order (all BBYO)</option>'+
    AZ.map(r=>'<option value="'+r.id+'">'+r.name+(r.status==="populated"?" ✓":"")+'</option>').join("");
  sel.addEventListener("change",e=>go(e.target.value));
  document.getElementById("foot").innerHTML =
    DATA.regions.length+" regions · "+DATA.schoolYear+" · ⚠️ = needs verifying · data gathered "+DATA.lastGathered;
  go("order");
</script>
</body>
</html>
